webdriver {
    driver = chrome
    auto_download = true
    capabilities {
        browserName = "chrome"
        "goog:chromeOptions" {
            args = ["window-size=1920,1080", "disable-gpu", "--no-sandbox", "--disable-dev-shm-usage", "--remote-allow-origins=*"]
        }
    }
}

serenity {
    take_screenshots = FOR_EACH_ACTION
    screenshot_format = PNG
    output_directory = build/reports/serenity
    screenshot_directory = build/reports/serenity/screenshots
}

logging {
    level = INFO
}
